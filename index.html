<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이들의 성장일기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #fffaf3;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #ffcc80, #ffb74d);
      color: #fff;
      padding: 48px 20px 40px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
    }

    header p {
      margin: 12px 0 0;
      font-size: 16px;
      opacity: 0.95;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .intro {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .intro h2 {
      margin-top: 0;
      font-size: 22px;
      color: #f57c00;
    }

    .intro p {
      margin-bottom: 0;
      color: #555;
    }

    .post-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .post-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }

    .media-box {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #f3f3f3;
      overflow: hidden;
    }

    .media-box img,
    .media-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-content {
      padding: 18px;
    }

    .post-date {
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
    }

    .post-title {
      margin: 0 0 10px;
      font-size: 18px;
      color: #333;
    }

    .post-text {
      margin: 0;
      font-size: 14px;
      color: #555;
      white-space: pre-line;
    }
