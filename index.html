<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>남지우 · 남우주 형제의 성장일기</title>
  <style>
    :root{--bg:#fafafa;--card:#fff;--accent:#ff7b7b;--muted:#6b6b6b}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:#111}
    .top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ff9a9a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
    .container{max-width:1000px;margin:18px auto;padding:0 14px}
    .composer{display:flex;gap:12px;margin-bottom:16px}
    .composer .preview{width:120px;height:120px;background:#f3f3f3;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:12px;color:var(--muted)}
    .composer textarea{flex:1;min-height:120px;padding:10px;border-radius:8px;border:1px solid #e6e6e6;resize:vertical}
    .btn{padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px}
    .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .card{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 6px 18px rgba(18,22,30,0.06);display:flex;flex-direction:column}
    .card img{width:100%;height:260px;object-fit:cover;background:#eee}
    .meta{padding:10px;display:flex;justify-content:space-between;align-items:center}
    .caption{padding:0 10px 12px;color:#222;font-size:14px}
    .time{font-size:12px;color:var(--muted)}
    .delete{background:#fff;border:1px solid #f1c0c0;color:#c0392b;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px}
    .empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.card img{height:200px}}
    @media(max-width:560px){
      .grid{grid-template-columns:1fr}
      .composer{flex-direction:column}
      .composer .preview{width:100%;height:160px}
      .top{flex-direction:column;align-items:flex-start;gap:6px}
    }
  </style>
</head>
<body>
  <!-- 상단 바 -->
  <div class="top">
    <div class="brand">
      <div class="logo">NJ·NU</div>
      <div>
        <div style="font-weight:700;font-size:15px">남지우 · 남우주 형제의 성장일기</div>
        <div style="font-size:12px;color:var(--muted)">사진과 글로 남기는 형제의 하루하루</div>
      </div>
    </div>
    <button class="btn" id="clearAll">전체 삭제</button>
  </div>

  <main class="container">
    <!-- 글 + 사진 작성 영역 -->
    <section class="composer card" style="padding:12px">
      <div class="preview" id="previewBox">사진 미리보기</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px">
        <textarea id="captionInput" placeholder="오늘 남지우·남우주 형제의 이야기를 적어보세요. (예: 오늘은 같이 공원에서 자전거를 탔어요!)"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
          <input type="file" id="imageInput" accept="image/*" style="display:none" />
          <button class="btn" id="pickImage">사진 선택</button>
          <button class="btn primary" id="postBtn">게시</button>
        </div>
      </div>
    </section>

    <!-- 피드 -->
    <section id="feed">
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" style="display:none">
        아직 게시물이 없습니다.<br />위에서 첫 성장 기록을 남겨보세요.
      </div>
    </section>
  </main>

  <script>
    // 로컬 저장 키
    const STORAGE_KEY = 'nj_nu_growth_posts_v1';

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const imageInput = document.getElementById('imageInput');
    const pickImage = document.getElementById('pickImage');
    const previewBox = document.getElementById('previewBox');
    const captionInput = document.getElementById('captionInput');
    const postBtn = document.getElementById('postBtn');
    const clearAll = document.getElementById('clearAll');

    let posts = [];
    let currentImageData = null;

    // 초기 로드
    loadPosts();
    render();

    // ---------- 저장 관련 ----------
    function savePosts() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
      } catch (e) {
        alert('저장에 실패했습니다. (브라우저 저장공간 제한)');
      }
    }

    function loadPosts() {
      const raw = localStorage.getItem(STORAGE_KEY);
      posts = raw ? JSON.parse(raw) : [];
    }

    // ---------- 유틸 ----------
    function makeId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function timeAgo(iso) {
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return `${diff}초 전`;
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return `${Math.floor(diff / 86400)}일 전`;
    }

    function escapeHtml(s){
      if(!s) return '';
      return s.replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
      ));
    }

    function setPreview(dataUrl) {
      currentImageData = dataUrl;
      previewBox.innerHTML = '';
      const img = new Image();
      img.src = dataUrl;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      previewBox.appendChild(img);
    }

    // ---------- 렌더 ----------
    function render() {
      grid.innerHTML = '';
      if (posts.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      // 최신 게시물이 위로 오게
      posts.slice().reverse().forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${p.image}" alt="성장일기 사진" />
          <div class="meta">
            <div style="font-weight:600;font-size:14px">${escapeHtml(p.author)}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <div class="time">${timeAgo(p.createdAt)}</div>
              <button class="delete" data-id="${p.id}">삭제</button>
            </div>
          </div>
          <div class="caption">
            <strong>${escapeHtml(p.author)}</strong>
            ${escapeHtml(p.caption)}
          </div>
        `;
        grid.appendChild(card);
      });

      // 삭제 버튼 이벤트
      grid.querySelectorAll('.delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!confirm('이 기록을 삭제할까요?')) return;
          const id = btn.dataset.id;
          posts = posts.filter(p => p.id !== id);
          savePosts();
          render();
        });
      });
    }

    // ---------- 사진 선택 ----------
    pickImage.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일을 선택해주세요.');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => setPreview(reader.result);
      reader.readAsDataURL(file);
      imageInput.value = '';
    });

    // 이미지 드래그 앤 드롭 지원 (작성 영역 전체에)
    previewBox.addEventListener('dragover', e => {
      e.preventDefault();
      previewBox.style.border = '2px dashed #ccc';
    });
    previewBox.addEventListener('dragleave', () => {
      previewBox.style.border = 'none';
    });
    previewBox.addEventListener('drop', e => {
      e.preventDefault();
      previewBox.style.border = 'none';
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일을 드롭해주세요.');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => setPreview(reader.result);
      reader.readAsDataURL(file);
    });

    // ---------- 게시 ----------
    postBtn.addEventListener('click', () => {
      const caption = captionInput.value.trim();
      if (!currentImageData) {
        alert('사진을 먼저 선택해주세요.');
        return;
      }
      const author = '남지우 · 남우주';
      const post = {
        id: makeId(),
        author,
        caption: caption || '오늘의 형제 이야기 💬',
        image: currentImageData,
        createdAt: new Date().toISOString()
      };
      posts.push(post);
      savePosts();
      captionInput.value = '';
      previewBox.innerHTML = '사진 미리보기';
      currentImageData = null;
      render();
    });

    // ---------- 전체 삭제 ----------
    clearAll.addEventListener('click', () => {
      if (!confirm('모든 성장 기록을 지울까요? (되돌릴 수 없습니다)')) return;
      posts = [];
      savePosts();
      render();
    });
  </script>
</body>
</html>
